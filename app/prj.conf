CONFIG_FPU=y
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=81920
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=y
CONFIG_PM_DEVICE=y

# BLE
CONFIG_BT=y
# Set conducted output power to 5 dBm which will limit EIRP to ~8.1 dBm which
# is well below the limit of 10 dBm according to EN 300 328 v2.2.2
CONFIG_BT_CTLR_TX_PWR_PLUS_5=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_EXT_ADV_MAX_ADV_SET=2
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="XM126 Tank"

# BLE (mcumgr) firmware update -- pulls in MCUMGR, MCUMGR_TRANSPORT_BT, IMG_MANAGER,
# STREAM_FLASH, FLASH_MAP, MCUMGR_GRP_IMG/OS and BT buffer sizing.
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_NCS_SAMPLE_MCUMGR_BT_OTA_DFU=y
CONFIG_NCS_SAMPLE_MCUMGR_BT_OTA_DFU_SPEEDUP=y

# Persisted tank geometry (diameter / floor offset), configurable over BLE
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y

# Defer printk logs to the logging framework
CONFIG_PRINTK=y

CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y

# Lets the app trigger MCUboot serial recovery (DFU mode) itself over the console
# UART, via the same retained-memory boot-mode flag the physical DFU button sets.
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_REBOOT=y

# Battery voltage measurement (acc_battery_info.c), needs the vbatt node enabled in
# boards/xm126.overlay
CONFIG_ADC=y
CONFIG_GPIO=y
CONFIG_ADC_ASYNC=y
CONFIG_ADC_NRFX_SAADC=y

# MCU die temperature (acc_mcu_temperature.c) -- the SoC's temp devicetree node is
# already enabled by default, no overlay needed
CONFIG_SENSOR=y
CONFIG_TEMP_NRF5=y

CONFIG_KERNEL_BIN_NAME="xm126_bthome_tank"
